model:
  name: mrvp
  cmrt:
    reset_slot_count: 16
    reset_slot_dim: 64
    mixture_count: 5
    prefix_horizon: 20
    hidden_dim: 256
  rpfn:
    program_count: 6
    recovery_horizon: 30
    control_dim: 3
    hidden_dim: 256
    dt: 0.1

selection:
  beta: 0.2
  num_reset_samples: 16
  use_certificate_correction: false

loss:
  cmrt:
    reset: 1.0
    world: 0.5
    degradation: 1.0
    counterfactual: 0.2
    uncertainty: 1.0
    audit_event: 0.0
    slot_distill: 0.0
  rpfn:
    execution: 0.5
    certificate: 1.0
    funnel: 0.2
    order: 1.0

data:
  preferred_fields:
    - root_id
    - split
    - family
    - action_id
    - action_vec
    - o_hist
    - h_ctx
    - x_t
    - rho_imp
    - harm_bin
    - reset_time
    - reset_state
    - degradation
    - reset_uncertainty_target
    - recovery_world
    - teacher_u
    - teacher_traj
    - m_star
    - b_star
    - s_star
